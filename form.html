<!DOCTYPE html>
<html lang="en"> 
    <head>
        <meta charset="UTF-8">
        <title>Student Review Form</title>
         <link rel="stylesheet" href="styles.css">
        </head>
        <body>
            <header>
                <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                    <div class="container">
                        <a class="navbar-brand" href="index.html">My Website</a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse" id="navbarNav">
                            <ul class="navbar-nav">
                                <li class="nav-item">
                                    <a class="nav-link" href="index.html">Home</a>
                                </li>
                                 </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <form>
        <div class="container my-5>">
            <h1 class="text-center mb-4">We value your feedback</h1>
            <div class="row">
                <div class="col-1g mx-auto">
                    <form action ="acknowledgement.html" method="get">
                        <div class="mb-3">
                            <label for="studentname" class="form-label">Your Name:</label>
                            <input type="text" class="form-control" id="studentname" name="studentName" placeholder="Enter your name" required>
                        </div>

                        <div class="mb-3">
                            <label for="StudentEmail" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="StudentEmail" name="studentEmail" placeholder="name@example.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="studentmessage" class="form-label">Your Feedback:</label>
                            <textarea class="form-control" id="studentMessage" name="studentMessage" rows="5" placeholder="Tell us about your favorite tye of crocs and suggest where I should imrpove my crocs business." required></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">submit</button>
                    </form>
                </div>
            </div>
        </div>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Goabaone Molebatsi. All rights reserved.</p>
    </footer>
</body>
</html>
